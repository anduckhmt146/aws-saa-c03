# appspec.yml — CodeDeploy instructions for EC2/On-premises
version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/app

hooks:
  # Deployment lifecycle events (in order):
  # ApplicationStop → BeforeInstall → Install → AfterInstall
  # → ApplicationStart → ValidateService
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root

  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 30
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 30
      runas: root
